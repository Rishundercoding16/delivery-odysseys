<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Delivery Odysseys</title>

    <!-- Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Leaflet -->

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- Custom CSS -->

    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

<div id="sidebar">

    <h1>Delivery Odysseys</h1>

    <div class="card">

        <h2>Route Optimizer</h2>

        <div class="search-box">

            <input type="text"
                   id="start"
                   placeholder="Start Location"
                   autocomplete="off">

            <div id="startSuggestions"
                 class="suggestions"></div>

        </div>

        <div class="search-box">

            <input type="text"
                   id="end"
                   placeholder="Destination"
                   autocomplete="off">

            <div id="endSuggestions"
                 class="suggestions"></div>

        </div>

        <button onclick="findRoute()">
            Optimize Route
        </button>

    </div>

    <div class="card">

        <h2>Route Details</h2>

        <div class="card">

    <h2>Assigned Driver</h2>

    <p id="driverName">
        Rider: --
    </p>

    <p id="driverRating">
        Rating: --
    </p>

    <p id="driverVehicle">
        Vehicle: --
    </p>

</div>

        <p id="distance">
            Distance: --
        </p>

        <p id="duration">
            ETA: --
        </p>

        <p id="driverStatus">
        Driver Status: Waiting
        </p>

    </div>

</div>

<div id="map"></div>

<div class="legend">

    <div>
        🟢 Driver
    </div>

    <div>
        🔴 Order
    </div>

    <div>
        🔵 User
    </div>

</div>

<div class="heatmapLegend">

    <div>🔴 High Demand</div>

    <div>🟠 Medium Demand</div>

    <div>🟢 Low Demand</div>

</div>

<div class="dashboardPanel">

    <div class="card">

        <h2>Fleet Overview</h2>

        <div id="fleetDashboard"></div>

    </div>

    <div class="card">

        <h2>Fleet Monitoring</h2>

        <div id="fleetStats"></div>

    </div>

    <div class="card">

        <h2>Analytics</h2>

        <div id="analyticsPanel"></div>

    </div>

</div>

<div id="notification"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="map.js"></script>

</body>

</html>
